<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>DittosLoop For Codex</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css?v=20260625">
  </head>
  <body>
    <main class="loop-shell">
      <aside class="loop-list" aria-label="Live Loop list">
        <header class="list-header">
          <div class="brand-lockup">
            <h1>Dittos.Loop</h1>
          </div>
          <button id="new-loop" class="new-loop-button" type="button">+ 新建循环</button>
        </header>

        <nav class="list-view-switch" aria-label="Live Loop views">
          <button id="show-projects" class="list-view-button active" type="button" aria-pressed="true" aria-controls="project-view">项目</button>
          <button id="show-templates" class="list-view-button" type="button" aria-pressed="false" aria-controls="template-view">Loop示例</button>
        </nav>

        <section id="project-view" class="list-pane active" aria-label="Project loops">
          <section class="loop-group">
            <div id="loops" class="loop-rows"></div>
          </section>
        </section>

        <section id="template-view" class="list-pane" aria-label="Loop templates" hidden>
          <section id="templates" class="template-gallery"></section>
        </section>
      </aside>

      <section class="loop-workspace" aria-label="Selected Live Loop">
        <div id="loop-stage" class="loop-stage"></div>
      </section>
    </main>
    <script src="app.js?v=20260625" type="module"></script>
  </body>
</html>
