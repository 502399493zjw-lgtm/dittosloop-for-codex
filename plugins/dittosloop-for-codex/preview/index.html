<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>DittosLoop For Codex</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css?v=20260625">
  </head>
  <body>
    <main class="loop-shell">
      <aside class="loop-list" aria-label="Live Loop list">
        <header class="list-header">
          <div class="brand-lockup">
            <h1>Dittos.Loop</h1>
          </div>
          <button id="new-loop" class="new-loop-button" type="button">+ 新建循环</button>
        </header>

        <section class="loop-group">
          <div id="loops" class="loop-rows"></div>
        </section>
      </aside>

      <section class="loop-workspace" aria-label="Selected Live Loop">
        <div id="loop-stage" class="loop-stage"></div>
      </section>
    </main>
    <script src="app.js?v=20260625" type="module"></script>
  </body>
</html>
