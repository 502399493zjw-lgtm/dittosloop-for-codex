<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>DittosLoop For Codex</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="loop-shell">
      <aside class="loop-list" aria-label="Live Loop list">
        <header class="list-header">
          <div class="brand-lockup">
            <h1>Live Loop</h1>
            <span>跟你一起，持续自我迭代</span>
          </div>
          <button id="refresh" class="new-loop-button" type="button">+ 新建循环</button>
        </header>

        <section class="loop-group">
          <header class="group-title">
            <span class="group-dot"></span>
            <span>独立 · 未归项目</span>
            <span id="loop-group-count" class="group-count">0</span>
          </header>
          <div id="loops" class="loop-rows"></div>
        </section>
      </aside>

      <section class="loop-workspace" aria-label="Selected Live Loop">
        <div id="loop-stage" class="loop-stage"></div>
      </section>
    </main>
    <script src="app.js" type="module"></script>
  </body>
</html>
